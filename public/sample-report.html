    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        const loading = document.getElementById("__bundler_loading");
        function setStatus(msg) {
          if (loading) loading.textContent = msg;
        }

        const FONT_MIME =
          /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
        const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
        function toBase64(bytes) {
          let bin = "";
          for (let i = 0; i < bytes.length; i += 0x8000) {
            bin += String.fromCharCode.apply(
              null,
              bytes.subarray(i, i + 0x8000),
            );
          }
          return btoa(bin);
        }

        // Error sink persists across replaceWith since it's on window, not the DOM.
        window.addEventListener(
          "error",
          function (e) {
            // Failed resource loads (CSP-blocked links, scripts, images) fire plain
            // events at the element — warn only; real JS errors carry message/error.
            if (!e.message && !e.error && e.target && e.target !== window) {
              console.warn(
                "[bundle] resource failed to load:",
                e.target.tagName,
                String(e.target.src || e.target.href || ""),
              );
              return;
            }
            var p = document.body || document.documentElement;
            var d =
              document.getElementById("__bundler_err") ||
              p.appendChild(document.createElement("div"));
            d.id = "__bundler_err";
            d.style.cssText =
              "position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto";
            d.textContent =
              (d.textContent ? d.textContent + String.fromCharCode(10) : "") +
              "[bundle] " +
              (e.message || e.type) +
              (e.filename
                ? " (" + e.filename.slice(0, 60) + ":" + e.lineno + ")"
                : "");
          },
          true,
        );

        try {
          const manifestEl = document.querySelector(
            'script[type="__bundler/manifest"]',
          );
          const templateEl = document.querySelector(
            'script[type="__bundler/template"]',
          );
          if (!manifestEl || !templateEl) {
            setStatus("Error: missing bundle data");
            console.error(
              "[bundler] Missing script tags — manifestEl:",
              !!manifestEl,
              "templateEl:",
              !!templateEl,
            );
            return;
          }

          const manifest = JSON.parse(manifestEl.textContent);
          let template = JSON.parse(templateEl.textContent);

          const uuids = Object.keys(manifest);
          setStatus("Unpacking " + uuids.length + " assets...");

          const blobUrls = {};
          const resourceBlobs = {};
          await Promise.all(
            uuids.map(async (uuid) => {
              const entry = manifest[uuid];
              try {
                const binaryStr = atob(entry.data);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++)
                  bytes[i] = binaryStr.charCodeAt(i);

                let finalBytes = bytes;
                if (entry.compressed) {
                  if (typeof DecompressionStream !== "undefined") {
                    const ds = new DecompressionStream("gzip");
                    const writer = ds.writable.getWriter();
                    const reader = ds.readable.getReader();
                    writer.write(bytes);
                    writer.close();
                    const chunks = [];
                    let totalLen = 0;
                    while (true) {
                      const { done, value } = await reader.read();
                      if (done) break;
                      chunks.push(value);
                      totalLen += value.length;
                    }
                    finalBytes = new Uint8Array(totalLen);
                    let offset = 0;
                    for (const chunk of chunks) {
                      finalBytes.set(chunk, offset);
                      offset += chunk.length;
                    }
                  } else {
                    console.warn(
                      "DecompressionStream not available, asset " +
                        uuid +
                        " may not render",
                    );
                  }
                }

                if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
                  // Strict artifact hosts allow font-src data: but not blob:.
                  blobUrls[uuid] =
                    "data:" +
                    entry.mime +
                    ";base64," +
                    (entry.compressed ? toBase64(finalBytes) : entry.data);
                } else {
                  const blob = new Blob([finalBytes], { type: entry.mime });
                  blobUrls[uuid] = URL.createObjectURL(blob);
                  resourceBlobs[blobUrls[uuid]] = blob;
                }
              } catch (err) {
                console.error("Failed to decode asset " + uuid + ":", err);
                const blob = new Blob([], { type: entry.mime });
                blobUrls[uuid] = URL.createObjectURL(blob);
                resourceBlobs[blobUrls[uuid]] = blob;
              }
            }),
          );

          const extResEl = document.querySelector(
            'script[type="__bundler/ext_resources"]',
          );
          const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
          const resourceMap = {};
          for (const entry of extResources) {
            if (blobUrls[entry.uuid])
              resourceMap[entry.id] = blobUrls[entry.uuid];
          }

          // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
          // consumers read these Blobs directly. Survives the swap like the error sink.
          window.__resourceBlobs = resourceBlobs;

          setStatus("Rendering...");
          for (const uuid of uuids)
            template = template.split(uuid).join(blobUrls[uuid]);

          // Strip integrity + crossorigin — blob URLs from a file:// document inherit
          // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
          // The manifest bytes are ours; SRI protects against CDN compromise, not this.
          template = template
            .replace(/\s+integrity="[^"]*"/gi, "")
            .replace(/\s+crossorigin="[^"]*"/gi, "");

          const resourceScript =
            "<script>window.__resources = " +
            JSON.stringify(resourceMap).replace(/<\//g, "<\\/") +
            ";</" +
            "script>";
          // Inject after <head> so the DOCTYPE stays first; prepending the script
          // would push the parser into quirks mode. DOMParser always emits a <head>
          // (synthesizing one if the source HTML omitted it) but may carry
          // attributes through, so match the full opening tag. slice() rather than
          // replace() keeps us clear of $-pattern substitution in resourceScript.
          const headOpen = template.match(/<head[^>]*>/i);
          if (headOpen) {
            const i = headOpen.index + headOpen[0].length;
            template =
              template.slice(0, i) + resourceScript + template.slice(i);
          }

          // Parse the template and swap the root element. Scripts inserted via
          // DOMParser/replaceWith are inert per spec — re-create each with
          // createElement so they execute, awaiting onload for src scripts to
          // preserve ordering (React before ReactDOM before Babel before text/babel).
          const doc = new DOMParser().parseFromString(template, "text/html");
          document.documentElement.replaceWith(doc.documentElement);
          const dead = Array.from(document.scripts);
          for (const old of dead) {
            const s = document.createElement("script");
            for (const a of old.attributes) s.setAttribute(a.name, a.value);
            s.textContent = old.textContent;
            // text/babel scripts with a src: read and inline. transformScriptTags
            // does XHR against the src, but blob:null/ from a file:// origin is
            // silently dropped. Inlining makes it a plain inline babel script,
            // which transformScriptTags handles unconditionally.
            if ((s.type === "text/babel" || s.type === "text/jsx") && s.src) {
              const pre = resourceBlobs[s.src.split("#")[0]];
              s.textContent = pre
                ? await pre.text()
                : await (await fetch(s.src)).text();
              s.removeAttribute("src");
            }
            const p = s.src
              ? new Promise(function (r) {
                  s.onload = s.onerror = r;
                })
              : null;
            old.replaceWith(s);
            if (p) await p;
          }
          // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
          // which fired before we swapped the document. Trigger manually if present.
          if (
            window.Babel &&
            typeof window.Babel.transformScriptTags === "function"
          ) {
            window.Babel.transformScriptTags();
          }
        } catch (err) {
          setStatus("Error unpacking: " + err.message);
          console.error("Bundle unpack error:", err);
        }
      });
    </script>

a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2b2b2d 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2b2b2d 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2b2b2d 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.blueprint {\n  position: relative;\n  border: 1px solid var(--color-divider);\n  border-radius: 0;\n}\n/* The overlay image treatments (halftone, duotone) clip their overlay\n   (overflow:hidden); a blueprint wrapper draws its registration marks\n   outside the box, so when both classes share a wrapper the frame must\n   win. */\n.blueprint.halftone, .blueprint.plate, .blueprint.duotone { overflow: visible; }\n.blueprint > .corner {\n  position: absolute; width: 11px; height: 11px;\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.blueprint > .corner::before, .blueprint > .corner::after {\n  content: \"\"; position: absolute; background: currentColor;\n}\n.blueprint > .corner::before { left: 5px; top: 0; width: 1px; height: 100%; }\n.blueprint > .corner::after  { top: 5px; left: 0; width: 100%; height: 1px; }\n.blueprint > .corner.tl { top: -6px; left: -6px; }\n.blueprint > .corner.tr { top: -6px; right: -6px; }\n.blueprint > .corner.bl { bottom: -6px; left: -6px; }\n.blueprint > .corner.br { bottom: -6px; right: -6px; }\n\n.duotone{position:relative;overflow:hidden}\n.duotone::after{content:\"\";position:absolute;inset:0;pointer-events:none;\n  background:var(--color-accent);mix-blend-mode:color}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 1px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 13px; line-height: 1.2; color: var(--color-text);\n  background: transparent; border: 1px solid transparent;\n  padding: calc(var(--space-2) * 0.85) var(--space-3);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 34px; height: 34px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: none;\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 1px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid color-mix(in srgb, var(--color-text) 8%, transparent);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n  background: var(--color-surface); box-shadow: var(--shadow-lg);\n}\n.dialog-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 20px;\n}\n.dialog-body { font-size: 14px; opacity: 0.85; }\n.dialog-actions { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-2); }\n\n/* — blueprint frame: components are wireframe objects (see .blueprint\n     and .corner above) — square, transparent, hairline-bordered — */\n.card, .btn, .input, .tag, .seg, .dialog { border-radius: 0; }\n.card, .dialog { background: transparent; border: 1px solid var(--color-divider); }\n.btn { border: 1px solid var(--color-divider); }\n.btn-primary { border-color: var(--color-accent); }\n.btn-ghost { border-color: transparent; }\n\n<\u002Fstyle>\n\n<style>\n:root{\n  --paper:#f2f2f3;\n  --desk:#c9cbcf;\n  --ink:var(--color-text);\n  --steel:var(--color-accent);\n  --steel-7:var(--color-accent-700);\n  --steel-8:var(--color-accent-800);\n  --steel-9:var(--color-accent-900);\n  --hair:var(--color-divider);\n  --hair-soft:color-mix(in srgb, var(--color-text) 8%, transparent);\n}\nhtml,body{margin:0;padding:0}\nbody{background:var(--desk);font-family:var(--font-body);color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}\n*{-webkit-print-color-adjust:exact;print-color-adjust:exact}\na{color:var(--steel-7)}a:hover{color:var(--steel-8)}\n\n/* ---- desk + page cards ---- */\n.deck{display:flex;flex-direction:column;align-items:center;gap:26px;padding:34px 0}\n.page{position:relative;width:8.5in;height:11in;background:var(--paper);box-shadow:0 10px 34px rgba(30,45,61,.28);overflow:hidden;display:flex;flex-direction:column}\n.pad{flex:1;display:flex;flex-direction:column;padding:0.62in 0.66in 0.5in}\n\n/* ---- type helpers ---- */\nh1,h2,h3,h4{margin:0;font-family:var(--font-heading);font-weight:600;letter-spacing:-.015em;line-height:1.08}\n.kicker{font-family:var(--font-heading);font-weight:600;text-transform:uppercase;letter-spacing:.16em;font-size:10.5px;color:var(--steel-7)}\n.eyebrow{font-family:var(--font-heading);font-weight:600;text-transform:uppercase;letter-spacing:.14em;font-size:10px;color:color-mix(in srgb,var(--ink) 52%,transparent)}\n.lede{font-size:14.5px;line-height:1.5;color:color-mix(in srgb,var(--ink) 78%,transparent)}\n.muted{color:color-mix(in srgb,var(--ink) 55%,transparent)}\n.mono{font-variant-numeric:tabular-nums}\np{margin:0 0 9px}\n\n/* ---- doc header / footer ---- */\n.dhead{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:12px;border-bottom:1px solid var(--hair);margin-bottom:20px}\n.dhead .sec{text-align:right}\n.dhead h2{font-size:26px;letter-spacing:-.02em}\n.dhead .num{font-family:var(--font-heading);font-size:11px;letter-spacing:.14em;color:var(--steel-7);text-transform:uppercase}\n.foot{display:flex;justify-content:space-between;align-items:center;padding:0 0.66in;height:0.4in;border-top:1px solid var(--hair);font-family:var(--font-heading);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:color-mix(in srgb,var(--ink) 48%,transparent)}\n.foot .dot{width:4px;height:4px;background:var(--steel);display:inline-block;margin:0 7px;vertical-align:middle}\n\n/* ---- blueprint frame corners ---- */\n.bp{position:relative;border:1px solid var(--hair)}\n.bp>.c{position:absolute;width:9px;height:9px;color:color-mix(in srgb,var(--ink) 50%,transparent)}\n.bp>.c::before,.bp>.c::after{content:\"\";position:absolute;background:currentColor}\n.bp>.c::before{left:4px;top:0;width:1px;height:100%}\n.bp>.c::after{top:4px;left:0;height:1px;width:100%}\n.bp>.tl{top:-5px;left:-5px}.bp>.tr{top:-5px;right:-5px}.bp>.bl{bottom:-5px;left:-5px}.bp>.br{bottom:-5px;right:-5px}\n\n/* ---- tags / badges ---- */\n.badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-heading);font-weight:600;text-transform:uppercase;letter-spacing:.09em;font-size:10px;padding:4px 9px;line-height:1}\n.b-crit{background:var(--steel-9);color:var(--paper)}\n.b-major{background:var(--color-accent-300);color:var(--steel-9)}\n.b-minor{border:1px solid var(--hair);color:color-mix(in srgb,var(--ink) 60%,transparent)}\n.b-phase{background:var(--steel);color:var(--paper)}\n.b-off{background:var(--color-accent-200);color:var(--steel-8)}\n.b-int{border:1px dashed color-mix(in srgb,var(--ink) 38%,transparent);color:color-mix(in srgb,var(--ink) 62%,transparent)}\nsvg{display:block}\n.ic{width:15px;height:15px;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}\n\n/* ---- page 1 ---- */\n.brandrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}\n.brandrow img{height:44px;width:auto}\n.brandrow .meta{text-align:right;font-family:var(--font-heading);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:color-mix(in srgb,var(--ink) 55%,transparent);line-height:1.7}\n.title1{font-size:40px;line-height:.98;letter-spacing:-.025em;margin-bottom:6px}\n.subj{display:flex;gap:14px;align-items:baseline;margin-top:10px;padding-bottom:16px;border-bottom:1px solid var(--hair)}\n.subj .big{font-size:19px}\n.hero{display:grid;grid-template-columns:2.05fr 3fr;margin-top:20px}\n.hero .gcell{padding:20px 22px;display:flex;flex-direction:column;justify-content:center}\n.grade{font-family:var(--font-heading);font-weight:600;font-size:118px;line-height:.82;letter-spacing:-.04em;color:var(--steel-9)}\n.gscore{font-family:var(--font-heading);font-size:20px;letter-spacing:.02em;color:var(--steel-7);margin-top:4px}\n.gcell.right{border-left:1px solid var(--hair);gap:14px}\n.verdict{font-size:14px;line-height:1.45;color:color-mix(in srgb,var(--ink) 82%,transparent)}\n/* gauge */\n.gauge{margin-top:2px}\n.track{display:flex;height:15px;border:1px solid var(--hair)}\n.zone{position:relative}\n.zF{flex:45;background:var(--color-accent-100)}\n.zD{flex:15;background:var(--color-accent-200)}\n.zC{flex:15;background:var(--color-accent-400)}\n.zB{flex:10;background:var(--color-accent-600)}\n.zA{flex:15;background:var(--color-accent-800)}\n.gticks{display:flex;margin-top:4px;font-family:var(--font-heading);font-size:9.5px;letter-spacing:.1em;color:color-mix(in srgb,var(--ink) 50%,transparent)}\n.gticks span{text-align:center}\n.mark{position:absolute;top:-6px;bottom:-6px;left:68%;width:2px;background:var(--steel-9)}\n.mark::before{content:\"68\";position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-family:var(--font-heading);font-size:10px;color:var(--steel-9)}\n.trackwrap{position:relative;padding-top:14px}\n\n.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:24px;border:1px solid var(--hair)}\n.stat{padding:15px 16px}\n.stat+.stat{border-left:1px solid var(--hair)}\n.stat .lab{font-family:var(--font-heading);text-transform:uppercase;letter-spacing:.12em;font-size:9.5px;color:var(--steel-7)}\n.stat .val{font-family:var(--font-heading);font-weight:600;font-size:42px;line-height:1;letter-spacing:-.02em;margin-top:9px}\n.stat .val small{font-size:19px;color:color-mix(in srgb,var(--ink) 60%,transparent)}\n.stat .sub{font-size:11px;line-height:1.35;color:color-mix(in srgb,var(--ink) 55%,transparent);margin-top:8px}\n.minibar{height:5px;background:var(--color-accent-100);margin-top:10px;position:relative}\n.minibar i{position:absolute;left:0;top:0;bottom:0;background:var(--steel);display:block}\n\n.risks{margin-top:24px}\n.risks h3{font-size:15px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}\n.risk{display:grid;grid-template-columns:26px 1fr auto;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--hair-soft)}\n.risk:first-of-type{border-top:1px solid var(--hair)}\n.risk .rn{font-family:var(--font-heading);font-weight:600;font-size:19px;color:color-mix(in srgb,var(--ink) 32%,transparent)}\n.risk .rt{font-size:13px;line-height:1.4}\n.risk .rt b{font-weight:700}\n\n/* ---- page 2 methodology ---- */\n.two-col{display:grid;grid-template-columns:1fr 0.82fr;gap:24px;margin-top:4px}\n.method p{font-size:13.5px;line-height:1.55;margin-bottom:11px}\n.method h3{font-size:16px;text-transform:uppercase;letter-spacing:.08em;margin:18px 0 8px}\n.factbox{padding:16px}\n.factbox .row{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--hair-soft)}\n.factbox .row:last-child{border-bottom:0}\n.factbox .k{font-size:11.5px;color:color-mix(in srgb,var(--ink) 60%,transparent)}\n.factbox .v{font-family:var(--font-heading);font-weight:600;font-size:19px}\n.diagram{margin-top:22px;padding:22px 20px 18px}\n.diaghd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}\n.flow{display:grid;grid-template-columns:1fr 22px 1fr 22px 1fr 22px 1fr;align-items:stretch;gap:0}\n.node{border:1px solid var(--hair);padding:12px 11px;display:flex;flex-direction:column;gap:7px;background:var(--paper);min-height:96px}\n.node .ni{width:24px;height:24px;color:var(--steel)}\n.node .nt{font-family:var(--font-heading);font-weight:600;font-size:12.5px;line-height:1.12}\n.node .nd{font-size:10px;line-height:1.3;color:color-mix(in srgb,var(--ink) 55%,transparent)}\n.node .st{font-family:var(--font-heading);font-size:9px;letter-spacing:.12em;color:var(--steel-7)}\n.arrow{display:flex;align-items:center;justify-content:center;color:color-mix(in srgb,var(--ink) 40%,transparent)}\n.loopback{display:flex;align-items:center;gap:10px;margin-top:14px;padding:11px 14px;border:1px dashed color-mix(in srgb,var(--ink) 30%,transparent)}\n.loopback svg{width:18px;height:18px;stroke:var(--steel);stroke-width:1.5;fill:none;flex:none}\n.loopback span{font-size:11.5px;color:color-mix(in srgb,var(--ink) 68%,transparent)}\n.loopback b{font-family:var(--font-heading);color:var(--ink)}\n.dims{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:22px}\n.dim{padding:12px 13px;border:1px solid var(--hair)}\n.dim .dh{font-family:var(--font-heading);font-weight:600;font-size:13px;display:flex;align-items:center;gap:7px}\n.dim .dp{font-size:10.5px;line-height:1.4;color:color-mix(in srgb,var(--ink) 58%,transparent);margin-top:6px}\n.dim .ic{color:var(--steel)}\n\n/* ---- page 3 failure modes ---- */\n.fm-intro{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:end;margin-bottom:18px}\n.fm-total{text-align:right}\n.fm-total .lab{font-family:var(--font-heading);text-transform:uppercase;letter-spacing:.12em;font-size:9.5px;color:var(--steel-7)}\n.fm-total .v{font-family:var(--font-heading);font-weight:600;font-size:36px;line-height:1;letter-spacing:-.02em}\n.fmtable{width:100%;border-collapse:collapse}\n.fmtable th{text-align:left;font-family:var(--font-heading);font-weight:600;text-transform:uppercase;letter-spacing:.1em;font-size:10px;color:color-mix(in srgb,var(--ink) 55%,transparent);padding:0 12px 9px;border-bottom:1px solid var(--hair)}\n.fmtable td{padding:22px 12px;vertical-align:top;border-bottom:1px solid var(--hair-soft)}\n.fmtable .mode{font-family:var(--font-heading);font-weight:600;font-size:16px;line-height:1.1}\n.fmtable .moded{font-size:11px;line-height:1.4;color:color-mix(in srgb,var(--ink) 58%,transparent);margin-top:5px;max-width:250px}\n.fmtable .freq{font-family:var(--font-heading);font-weight:600;font-size:24px;line-height:1}\n.fmtable .frn{font-size:10.5px;color:color-mix(in srgb,var(--ink) 52%,transparent);margin-top:3px}\n.fmtable .dol{font-family:var(--font-heading);font-weight:600;font-size:22px;line-height:1;text-align:right}\n.fmtable .doln{font-size:10px;color:color-mix(in srgb,var(--ink) 52%,transparent);text-align:right;margin-top:3px}\n.rowcrit{background:color-mix(in srgb,var(--steel) 8%,transparent);position:relative}\n.rowcrit td:first-child{box-shadow:inset 4px 0 0 var(--steel-9)}\n.hazard{height:6px;background:repeating-linear-gradient(-45deg,var(--steel-9),var(--steel-9) 7px,var(--color-accent-300) 7px,var(--color-accent-300) 14px);margin-bottom:14px}\n.fmnote{display:flex;align-items:flex-start;gap:9px;margin-top:34px;padding:16px 18px;border:1px solid var(--hair)}\n.fmnote svg{width:16px;height:16px;stroke:var(--steel);stroke-width:1.5;fill:none;flex:none;margin-top:1px}\n.fmnote p{font-size:11.5px;line-height:1.5;color:color-mix(in srgb,var(--ink) 62%,transparent);margin:0}\n.freqbar{height:6px;background:var(--color-accent-100);margin-top:9px;max-width:150px;position:relative}\n.freqbar i{position:absolute;left:0;top:0;bottom:0;background:var(--steel)}\n\n/* ---- page 4 roadmap ---- */\n.rmlist{display:flex;flex-direction:column;gap:20px;margin-top:22px}\n.rm{display:grid;grid-template-columns:44px 1fr auto;gap:16px;align-items:start;padding:24px 22px}\n.rm .rk{font-family:var(--font-heading);font-weight:600;font-size:34px;line-height:.9;color:color-mix(in srgb,var(--ink) 26%,transparent)}\n.rm h3{font-size:18px;line-height:1.1;margin-bottom:6px}\n.rm p{font-size:12px;line-height:1.5;color:color-mix(in srgb,var(--ink) 64%,transparent);margin:0;max-width:400px}\n.rm .fixes{font-family:var(--font-heading);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--steel-7);margin-top:8px}\n.rm .side{display:flex;flex-direction:column;align-items:flex-end;gap:9px;min-width:118px}\n.rm .effort{font-size:10.5px;color:color-mix(in srgb,var(--ink) 55%,transparent);text-align:right}\n.rm-internal{border-style:dashed}\n\n/* ---- page 5 graduation ---- */\n.grad-lede{font-size:14.5px;line-height:1.5;color:color-mix(in srgb,var(--ink) 80%,transparent);max-width:560px;margin-bottom:20px}\n.steps{display:grid;grid-template-columns:repeat(6,1fr);gap:0;border:1px solid var(--hair);margin-bottom:32px}\n.step{padding:16px 11px;display:flex;flex-direction:column;gap:8px;min-height:156px}\n.step+.step{border-left:1px solid var(--hair)}\n.step .sn{font-family:var(--font-heading);font-size:10px;letter-spacing:.1em;color:color-mix(in srgb,var(--ink) 40%,transparent)}\n.step .sname{font-family:var(--font-heading);font-weight:600;font-size:13px;line-height:1.12}\n.step .sstat{margin-top:auto;font-family:var(--font-heading);font-size:9px;letter-spacing:.08em;text-transform:uppercase;display:inline-flex;align-items:center;gap:5px}\n.step.stable{background:color-mix(in srgb,var(--steel) 9%,transparent)}\n.step.stable .sstat{color:var(--steel-8)}\n.step .sstat.hold{color:color-mix(in srgb,var(--ink) 42%,transparent)}\n.step .dotm{width:7px;height:7px;flex:none}\n.dotm.on{background:var(--steel-9)}\n.dotm.off{border:1px solid color-mix(in srgb,var(--ink) 40%,transparent)}\n.grad-grid{display:grid;grid-template-columns:1.15fr 1fr;gap:20px}\n.savings{padding:30px 26px}\n.savings .lab{font-family:var(--font-heading);text-transform:uppercase;letter-spacing:.12em;font-size:10px;color:var(--steel-7)}\n.savings .v{font-family:var(--font-heading);font-weight:600;font-size:56px;line-height:.9;letter-spacing:-.03em;margin-top:10px}\n.savings .vn{font-size:12px;color:color-mix(in srgb,var(--ink) 58%,transparent);margin-top:10px;line-height:1.5}\n.offramp{padding:30px 26px;display:flex;flex-direction:column;gap:12px;background:var(--steel-9);color:var(--paper)}\n.offramp .oh{font-family:var(--font-heading);font-weight:600;font-size:20px}\n.offramp p{font-size:12px;line-height:1.5;color:color-mix(in srgb,#fff 78%,transparent);margin:0}\n.offramp .price{font-family:var(--font-heading);font-weight:600;font-size:30px;margin-top:auto}\n.offramp .price small{font-size:13px;color:color-mix(in srgb,#fff 60%,transparent)}\n\n/* ---- back page: velocity line ---- */\n.back{background:var(--paper)}\n.vl-hd{text-align:center;margin-bottom:8px}\n.vl-hd h2{font-size:34px;letter-spacing:-.02em}\n.journey{display:grid;grid-template-columns:1fr 30px 1fr 30px 1fr;align-items:stretch;margin-top:26px}\n.phase{border:1px solid var(--hair);padding:20px 18px;display:flex;flex-direction:column;gap:9px;min-height:280px}\n.phase.mid{background:var(--steel-9);color:var(--paper);border-color:var(--steel-9)}\n.phase .pn{font-family:var(--font-heading);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--steel-7)}\n.phase.mid .pn{color:var(--color-accent-300)}\n.phase h3{font-size:26px;letter-spacing:-.02em}\n.phase .stage{font-family:var(--font-heading);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:color-mix(in srgb,var(--ink) 50%,transparent)}\n.phase.mid .stage{color:color-mix(in srgb,#fff 60%,transparent)}\n.phase p{font-size:11.5px;line-height:1.5;color:color-mix(in srgb,var(--ink) 66%,transparent);margin:0}\n.phase.mid p{color:color-mix(in srgb,#fff 76%,transparent)}\n.phase .price{font-family:var(--font-heading);font-weight:600;font-size:26px;margin-top:auto;letter-spacing:-.01em}\n.phase .price small{display:block;font-size:11px;letter-spacing:.04em;color:color-mix(in srgb,var(--ink) 48%,transparent);margin-top:3px;font-weight:400}\n.phase.mid .price small{color:color-mix(in srgb,#fff 55%,transparent)}\n.jarrow{display:flex;align-items:center;justify-content:center;color:color-mix(in srgb,var(--ink) 38%,transparent)}\n.jcap{display:grid;grid-template-columns:1fr 30px 1fr 30px 1fr;margin-top:12px}\n.jcap div{text-align:center;font-family:var(--font-heading);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--steel-7)}\n.contact{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;margin-top:44px;padding-top:22px;border-top:1px solid var(--hair)}\n.contact img{height:52px}\n.contact .cx{text-align:right;font-size:12px;line-height:1.7}\n.contact .cx .cl{display:flex;gap:8px;justify-content:flex-end;align-items:center;color:color-mix(in srgb,var(--ink) 70%,transparent)}\n.contact .cx svg{width:14px;height:14px;stroke:var(--steel);stroke-width:1.5;fill:none}\n.contact .cx b{font-family:var(--font-heading);font-weight:600}\n.closing{text-align:center;margin-top:36px;font-family:var(--font-heading);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:color-mix(in srgb,var(--ink) 40%,transparent)}\n\n@media print{\n  body{background:#fff}\n  .deck{gap:0;padding:0}\n  .page{box-shadow:none;page-break-after:always;break-after:page}\n  .page:last-child{page-break-after:auto;break-after:auto}\n}\n@page{size:letter portrait;margin:0}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"deck\">\n\n<!-- ============================ PAGE 1, EXECUTIVE SUMMARY ============================ -->\n<section class=\"page\" data-screen-label=\"Page 1, Executive Summary\">\n<div class=\"pad\">\n  <div class=\"brandrow\">\n    <img src=\"2cfe9c72-272f-42e0-ab68-e2261d89dec3\" alt=\"10x Velocity\">\n    <div class=\"meta\">The Velocity Line · Onramp<br>Diagnostic No. FCF-0824<br>Prepared 12 Aug 2025<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"kicker\">Onramp Scorecard<\u002Fdiv>\n  <h1 class=\"title1\">AI Quoting Assistant<br>Performance Diagnostic<\u002Fh1>\n  <div class=\"subj\">\n    <div class=\"big\"><strong>Falls City Fabrication<\u002Fstrong><\u002Fdiv>\n    <div class=\"muted\">Metal fabrication · Louisville, KY · 320 employees · System live 8 months<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- grade hero -->\n  <div class=\"bp hero\"><i class=\"c tl\"><\u002Fi><i class=\"c tr\"><\u002Fi><i class=\"c bl\"><\u002Fi><i class=\"c br\"><\u002Fi>\n    <div class=\"gcell\">\n      <div class=\"eyebrow\" style=\"margin-bottom:6px\">Overall Grade<\u002Fdiv>\n      <div class=\"grade\">C+<\u002Fdiv>\n      <div class=\"gscore\">68 <span class=\"muted\" style=\"font-size:15px\">/ 100<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"gcell right\">\n      <div class=\"verdict\">The assistant is <b>doing real work but running unmeasured.<\u002Fb> Seven of ten quotes ship correctly; the rest carry rework, margin leak, or silent pricing errors. Fixable, and worth fixing.<\u002Fdiv>\n      <div class=\"gauge\">\n        <div class=\"trackwrap\">\n          <div class=\"track\">\n            <div class=\"zone zF\"><\u002Fdiv><div class=\"zone zD\"><\u002Fdiv><div class=\"zone zC\"><\u002Fdiv><div class=\"zone zB\"><\u002Fdiv><div class=\"zone zA\"><\u002Fdiv>\n            <div class=\"mark\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gticks\"><span style=\"flex:45\">F<\u002Fspan><span style=\"flex:15\">D<\u002Fspan><span style=\"flex:15\">C<\u002Fspan><span style=\"flex:10\">B<\u002Fspan><span style=\"flex:15\">A<\u002Fspan><\u002Fdiv>\n        <div class=\"muted\" style=\"font-size:9.5px;margin-top:7px;font-family:var(--font-heading);letter-spacing:.06em\">SCALE · A 85+ · B 75–84 · C 60–74 · D 45–59 · F &lt;45<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- headline stats -->\n  <div class=\"stats\">\n    <div class=\"stat\">\n      <div class=\"lab\">Accuracy<\u002Fdiv>\n      <div class=\"val\">71<small>%<\u002Fsmall><\u002Fdiv>\n      <div class=\"minibar\"><i style=\"width:71%\"><\u002Fi><\u002Fdiv>\n      <div class=\"sub\">Quotes correct with no human rework, across 500 replayed jobs.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat\">\n      <div class=\"lab\">Cost per quote<\u002Fdiv>\n      <div class=\"val\"><small>$<\u002Fsmall>1.84<\u002Fdiv>\n      <div class=\"sub\">LLM tokens plus staff review time. Roughly <b>$32.5K / year<\u002Fb> at current volume.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat\">\n      <div class=\"lab\">Reclaimable<\u002Fdiv>\n      <div class=\"val\">22<small> hrs/wk<\u002Fsmall><\u002Fdiv>\n      <div class=\"sub\">Estimator time returned if the failure modes below are closed. About 1,140 hrs/year.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- top 3 risks -->\n  <div class=\"risks\">\n    <h3>Top Three Risks<\u002Fh3>\n    <div class=\"risk\">\n      <div class=\"rn\">1<\u002Fdiv>\n      <div class=\"rt\">On non-standard alloys the assistant <b>invents material prices<\u002Fb>, quoting numbers no supplier will honor. The costliest and hardest-to-catch failure. <span class=\"badge b-crit\" style=\"margin-left:2px\"><svg class=\"ic\" viewBox=\"0 0 24 24\" style=\"width:11px;height:11px;stroke:currentColor\"><path d=\"M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"><\u002Fpath><path d=\"M12 9v4\"><\u002Fpath><path d=\"M12 17h.01\"><\u002Fpath><\u002Fsvg>Critical<\u002Fspan><\u002Fdiv>\n      <div><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"risk\">\n      <div class=\"rn\">2<\u002Fdiv>\n      <div class=\"rt\">It <b>skips quantity-discount tiers<\u002Fb>, overquoting bulk orders and losing winnable bids to competitors. <span class=\"badge b-major\" style=\"margin-left:2px\">Major<\u002Fspan><\u002Fdiv>\n      <div><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"risk\">\n      <div class=\"rn\">3<\u002Fdiv>\n      <div class=\"rt\">It pastes <b>outdated lead-time boilerplate<\u002Fb>, creating avoidable back-and-forth after the quote goes out. <span class=\"badge b-minor\" style=\"margin-left:2px\">Minor<\u002Fspan><\u002Fdiv>\n      <div><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<div class=\"foot\"><span>Onramp Scorecard <span class=\"dot\"><\u002Fspan> Falls City Fabrication<\u002Fspan><span>Confidential <span class=\"dot\"><\u002Fspan> 01 / 06<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ PAGE 2, HOW WE MEASURED ============================ -->\n<section class=\"page\" data-screen-label=\"Page 2, How We Measured\">\n<div class=\"pad\">\n  <div class=\"dhead\">\n    <div><div class=\"num\">Section 01<\u002Fdiv><h2>How We Measured<\u002Fh2><\u002Fdiv>\n    <div class=\"sec\"><div class=\"eyebrow\">Onramp Scorecard<\u002Fdiv><div class=\"muted\" style=\"font-size:11px\">Falls City Fabrication<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"two-col\">\n    <div class=\"method\">\n      <p class=\"lede\">No surveys, no gut feel. We rebuilt eight months of the assistant's real workload and re-ran it under a fixed test, scoring every output the same way a senior estimator would.<\u002Fp>\n      <h3>What we did<\u002Fh3>\n      <p>We pulled <b>500 real RFQ emails<\u002Fb> Falls City had already quoted and replayed them through the live assistant, using the exact prompts, the exact model, nothing tuned for the test.<\u002Fp>\n      <p>Each generated quote was checked by an <b>automated evaluation harness<\u002Fb> against the outcome your team actually shipped: correct material, correct pricing, correct quantity tiers, current lead times.<\u002Fp>\n      <p>Errors were <b>severity-weighted<\u002Fb>. A hallucinated alloy price counts far more than stale boilerplate, so the grade reflects business risk, not raw error count.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"bp factbox\"><i class=\"c tl\"><\u002Fi><i class=\"c tr\"><\u002Fi><i class=\"c bl\"><\u002Fi><i class=\"c br\"><\u002Fi>\n      <div class=\"eyebrow\" style=\"margin-bottom:6px\">Test Parameters<\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Real quotes replayed<\u002Fspan><span class=\"v mono\">500<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Weekly volume baseline<\u002Fspan><span class=\"v mono\">340<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Months in production<\u002Fspan><span class=\"v mono\">8<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Scoring dimensions<\u002Fspan><span class=\"v mono\">3<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Human overrides in test<\u002Fspan><span class=\"v mono\">0<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- eval loop diagram -->\n  <div class=\"bp diagram\"><i class=\"c tl\"><\u002Fi><i class=\"c tr\"><\u002Fi><i class=\"c bl\"><\u002Fi><i class=\"c br\"><\u002Fi>\n    <div class=\"diaghd\"><h3 style=\"font-size:15px;text-transform:uppercase;letter-spacing:.08em\">The Evaluation Loop<\u002Fh3><div class=\"eyebrow\">Fig. 1<\u002Fdiv><\u002Fdiv>\n    <div class=\"flow\">\n      <div class=\"node\">\n        <svg class=\"ni ic\" viewBox=\"0 0 24 24\" style=\"width:24px;height:24px\"><path d=\"M4 4h11l5 5v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z\"><\u002Fpath><path d=\"M14 4v5h5\"><\u002Fpath><path d=\"M8 13h7M8 17h5\"><\u002Fpath><\u002Fsvg>\n        <div class=\"st\">Input<\u002Fdiv>\n        <div class=\"nt\">Replay real RFQ<\u002Fdiv>\n        <div class=\"nd\">One of 500 emails your team already quoted.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"arrow\"><svg class=\"ic\" viewBox=\"0 0 24 24\" style=\"width:18px;height:18px\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"m12 5 7 7-7 7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"node\">\n        <svg class=\"ni ic\" viewBox=\"0 0 24 24\" style=\"width:24px;height:24px\"><rect x=\"4\" y=\"4\" width=\"16\" height=\"16\" rx=\"1\"><\u002Frect><path d=\"M9 9h6v6H9z\"><\u002Fpath><path d=\"M4 10h-1M4 14h-1M21 10h-1M21 14h-1M10 4V3M14 4V3M10 21v-1M14 21v-1\"><\u002Fpath><\u002Fsvg>\n        <div class=\"st\">Generate<\u002Fdiv>\n        <div class=\"nt\">Assistant drafts quote<\u002Fdiv>\n        <div class=\"nd\">Live model, live prompt, untouched.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"arrow\"><svg class=\"ic\" viewBox=\"0 0 24 24\" style=\"width:18px;height:18px\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"m12 5 7 7-7 7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"node\">\n        <svg class=\"ni ic\" viewBox=\"0 0 24 24\" style=\"width:24px;height:24px\"><path d=\"M9 11 12 14 22 4\"><\u002Fpath><path d=\"M21 12v7a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h11\"><\u002Fpath><\u002Fsvg>\n        <div class=\"st\">Score<\u002Fdiv>\n        <div class=\"nt\">Harness checks output<\u002Fdiv>\n        <div class=\"nd\">Against the quote you actually shipped.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"arrow\"><svg class=\"ic\" viewBox=\"0 0 24 24\" style=\"width:18px;height:18px\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"m12 5 7 7-7 7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"node\">\n        <svg class=\"ni ic\" viewBox=\"0 0 24 24\" style=\"width:24px;height:24px\"><path d=\"M12 2a10 10 0 1 0 10 10\"><\u002Fpath><path d=\"M12 6v6l4 2\"><\u002Fpath><\u002Fsvg>\n        <div class=\"st\">Aggregate<\u002Fdiv>\n        <div class=\"nt\">Severity-weighted grade<\u002Fdiv>\n        <div class=\"nd\">Rolled up to the C+ on page one.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"loopback\">\n      <svg viewBox=\"0 0 24 24\"><path d=\"M21 12a9 9 0 1 1-2.64-6.36\"><\u002Fpath><path d=\"M21 3v5h-5\"><\u002Fpath><\u002Fsvg>\n      <span><b>Repeated 500 times.<\u002Fb> Every quote scored independently, then aggregated, no cherry-picking, no averaging away the bad ones.<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dims\">\n      <div class=\"dim\"><div class=\"dh\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>Accuracy<\u002Fdiv><div class=\"dp\">Did the quote match on material, price, and terms?<\u002Fdiv><\u002Fdiv>\n      <div class=\"dim\"><div class=\"dh\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6\"><\u002Fpath><\u002Fsvg>Cost<\u002Fdiv><div class=\"dp\">Tokens plus the review minutes each quote consumed.<\u002Fdiv><\u002Fdiv>\n      <div class=\"dim\"><div class=\"dh\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"><\u002Fpath><path d=\"M12 9v4M12 17h.01\"><\u002Fpath><\u002Fsvg>Severity<\u002Fdiv><div class=\"dp\">How much damage a given error does if it ships.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<div class=\"foot\"><span>Onramp Scorecard <span class=\"dot\"><\u002Fspan> Falls City Fabrication<\u002Fspan><span>Confidential <span class=\"dot\"><\u002Fspan> 02 / 06<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ PAGE 3, FAILURE MODES ============================ -->\n<section class=\"page\" data-screen-label=\"Page 3, Failure Modes\">\n<div class=\"pad\">\n  <div class=\"dhead\">\n    <div><div class=\"num\">Section 02<\u002Fdiv><h2>Failure Modes<\u002Fh2><\u002Fdiv>\n    <div class=\"sec\"><div class=\"eyebrow\">Onramp Scorecard<\u002Fdiv><div class=\"muted\" style=\"font-size:11px\">Falls City Fabrication<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"fm-intro\">\n    <div class=\"lede\" style=\"max-width:420px\">Three distinct failures account for nearly all rework. They differ less in frequency than in <b>what they cost you when they slip through.<\u002Fb><\u002Fdiv>\n    <div class=\"fm-total\">\n      <div class=\"lab\">Est. annual exposure<\u002Fdiv>\n      <div class=\"v mono\">~$222K<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hazard\"><\u002Fdiv>\n\n  <table class=\"fmtable\">\n    <thead><tr><th style=\"width:44%\">Failure mode<\u002Fth><th>Severity<\u002Fth><th>Frequency<\u002Fth><th style=\"text-align:right\">Annual exposure<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr class=\"rowcrit\">\n        <td>\n          <div class=\"mode\">Material price hallucination<\u002Fdiv>\n          <div class=\"moded\">On non-standard alloys the model fabricates a price with no source. These ship looking normal and surface only when a supplier invoice lands higher.<\u002Fdiv>\n        <\u002Ftd>\n        <td><span class=\"badge b-crit\"><svg class=\"ic\" viewBox=\"0 0 24 24\" style=\"width:11px;height:11px;stroke:currentColor\"><path d=\"M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"><\u002Fpath><path d=\"M12 9v4M12 17h.01\"><\u002Fpath><\u002Fsvg>Critical<\u002Fspan><\u002Ftd>\n        <td><div class=\"freq mono\">9%<\u002Fdiv><div class=\"frn\">~1,590 quotes / yr<\u002Fdiv><div class=\"freqbar\"><i style=\"width:29%\"><\u002Fi><\u002Fdiv><\u002Ftd>\n        <td><div class=\"dol mono\">~$142K<\u002Fdiv><div class=\"doln\">margin loss + repricing<\u002Fdiv><\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td>\n          <div class=\"mode\">Missed quantity-discount tiers<\u002Fdiv>\n          <div class=\"moded\">The assistant quotes unit price without applying volume breaks, overpricing bulk orders and losing bids you should win.<\u002Fdiv>\n        <\u002Ftd>\n        <td><span class=\"badge b-major\">Major<\u002Fspan><\u002Ftd>\n        <td><div class=\"freq mono\">12%<\u002Fdiv><div class=\"frn\">~2,120 quotes / yr<\u002Fdiv><div class=\"freqbar\"><i style=\"width:39%\"><\u002Fi><\u002Fdiv><\u002Ftd>\n        <td><div class=\"dol mono\">~$62K<\u002Fdiv><div class=\"doln\">lost &amp; underpriced bids<\u002Fdiv><\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td>\n          <div class=\"mode\">Outdated lead-time boilerplate<\u002Fdiv>\n          <div class=\"moded\">Standard lead-time language is stale, prompting customer follow-ups and manual correction after the quote is sent.<\u002Fdiv>\n        <\u002Ftd>\n        <td><span class=\"badge b-minor\">Minor<\u002Fspan><\u002Ftd>\n        <td><div class=\"freq mono\">31%<\u002Fdiv><div class=\"frn\">~5,480 quotes / yr<\u002Fdiv><div class=\"freqbar\"><i style=\"width:100%\"><\u002Fi><\u002Fdiv><\u002Ftd>\n        <td><div class=\"dol mono\">~$18K<\u002Fdiv><div class=\"doln\">rework &amp; follow-up time<\u002Fdiv><\u002Ftd>\n      <\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <div class=\"fmnote\">\n    <svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8v5M12 16h.01\"><\u002Fpath><\u002Fsvg>\n    <p><b>Read severity, not frequency.<\u002Fb> The Minor mode happens three times as often as the Critical one, yet costs a fraction as much. Fix in order of exposure, money at risk, not in order of how often the error appears. Exposure is estimated as frequency × average cost per incident at your current 340 quotes/week.<\u002Fp>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<div class=\"foot\"><span>Onramp Scorecard <span class=\"dot\"><\u002Fspan> Falls City Fabrication<\u002Fspan><span>Confidential <span class=\"dot\"><\u002Fspan> 03 / 06<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ PAGE 4, ROADMAP ============================ -->\n<section class=\"page\" data-screen-label=\"Page 4, Roadmap\">\n<div class=\"pad\">\n  <div class=\"dhead\">\n    <div><div class=\"num\">Section 03<\u002Fdiv><h2>Roadmap<\u002Fh2><\u002Fdiv>\n    <div class=\"sec\"><div class=\"eyebrow\">Onramp Scorecard<\u002Fdiv><div class=\"muted\" style=\"font-size:11px\">Falls City Fabrication<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <p class=\"lede\" style=\"margin-bottom:4px;max-width:560px\">Four fixes, ranked by exposure closed. Each is tagged with who should do it. One of them you should not pay anyone for.<\u002Fp>\n\n  <div class=\"rmlist\">\n    <div class=\"bp rm\"><i class=\"c tl\"><\u002Fi><i class=\"c tr\"><\u002Fi><i class=\"c bl\"><\u002Fi><i class=\"c br\"><\u002Fi>\n      <div class=\"rk\">01<\u002Fdiv>\n      <div>\n        <h3>Ground material pricing in a live source<\u002Fh3>\n        <p>Wire the assistant to your current alloy price feed and require a cited source for every material line, no source, no number. Kills the hallucination at the root.<\u002Fp>\n        <div class=\"fixes\">Closes: Material price hallucination · Critical<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"side\"><span class=\"badge b-phase\">Accelerate sprint<\u002Fspan><div class=\"effort\">Closes ~$142K<br>exposure<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"bp rm\"><i class=\"c tl\"><\u002Fi><i class=\"c tr\"><\u002Fi><i class=\"c bl\"><\u002Fi><i class=\"c br\"><\u002Fi>\n      <div class=\"rk\">02<\u002Fdiv>\n      <div>\n        <h3>Add quantity-discount tier logic<\u002Fh3>\n        <p>Encode your volume-break table so bulk orders price correctly and automatically. Recovers winnable bids without estimator intervention.<\u002Fp>\n        <div class=\"fixes\">Closes: Missed quantity-discount tiers · Major<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"side\"><span class=\"badge b-phase\">Accelerate sprint<\u002Fspan><div class=\"effort\">Closes ~$62K<br>exposure<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"bp rm rm-internal\"><i class=\"c tl\"><\u002Fi><i class=\"c tr\"><\u002Fi><i class=\"c bl\"><\u002Fi><i class=\"c br\"><\u002Fi>\n      <div class=\"rk\">03<\u002Fdiv>\n      <div>\n        <h3>Refresh the lead-time boilerplate<\u002Fh3>\n        <p>The stale language lives in a template your team already owns. Update the standard lead-time block and this failure disappears, with no model work required.<\u002Fp>\n        <div class=\"fixes\">Closes: Outdated lead-time boilerplate · Minor<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"side\"><span class=\"badge b-int\">Fix internally. You don't need us for this<\u002Fspan><div class=\"effort\">~1 afternoon<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"bp rm\"><i class=\"c tl\"><\u002Fi><i class=\"c tr\"><\u002Fi><i class=\"c bl\"><\u002Fi><i class=\"c br\"><\u002Fi>\n      <div class=\"rk\">04<\u002Fdiv>\n      <div>\n        <h3>Stand up continuous eval &amp; drift monitoring<\u002Fh3>\n        <p>Run this same scorecard automatically every week so a model update or a new alloy line never silently drops accuracy again. Keeps the grade from sliding back.<\u002Fp>\n        <div class=\"fixes\">Prevents: regression on all modes above<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"side\"><span class=\"badge b-off\">Offramp<\u002Fspan><div class=\"effort\">Ongoing<br>assurance<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<div class=\"foot\"><span>Onramp Scorecard <span class=\"dot\"><\u002Fspan> Falls City Fabrication<\u002Fspan><span>Confidential <span class=\"dot\"><\u002Fspan> 04 / 06<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ PAGE 5, GRADUATION PREVIEW ============================ -->\n<section class=\"page\" data-screen-label=\"Page 5, Graduation Preview\">\n<div class=\"pad\">\n  <div class=\"dhead\">\n    <div><div class=\"num\">Section 04<\u002Fdiv><h2>Graduation Preview<\u002Fh2><\u002Fdiv>\n    <div class=\"sec\"><div class=\"eyebrow\">Onramp Scorecard<\u002Fdiv><div class=\"muted\" style=\"font-size:11px\">Falls City Fabrication<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <p class=\"grad-lede\">Your quoting workflow is six steps. Once the fixes land, <b>two of those steps are simple and stable enough to run on a cheaper, faster model<\u002Fb>: same quality, lower bill. Here is where that stands today.<\u002Fp>\n\n  <div class=\"steps\">\n    <div class=\"step stable\">\n      <div class=\"sn\">STEP 1<\u002Fdiv><div class=\"sname\">Parse RFQ email<\u002Fdiv>\n      <div class=\"sstat\"><span
